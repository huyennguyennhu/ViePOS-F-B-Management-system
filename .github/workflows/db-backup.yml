name: Supabase Database Backup

on:
  schedule:
    # Chạy vào 00:00 UTC mỗi ngày (tương đương 07:00 sáng giờ Việt Nam)
    - cron: '0 0 * * *'
  # Cho phép bạn có thể bấm chạy backup thủ công bằng tay trên GitHub bất cứ lúc nào
  workflow_dispatch: 

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL Client 17
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /etc/apt/trusted.gpg.d/pgdg.asc &>/dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump Database
        run: |
          pg_dump "${{ secrets.DATABASE_URL }}" -Fc > backup_$(date +'%Y_%m_%d').dump

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-db-backup
          path: backup_*.dump
          retention-days: 90 # GitHub sẽ tự động giữ file này trong 90 ngày
